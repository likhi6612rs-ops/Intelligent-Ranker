openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: TalentLens Candidate Ranking API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: ranking
    description: AI ranking engine operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /ranking/analyze:
    post:
      operationId: analyzeResumes
      tags: [ranking]
      summary: Parse uploaded resumes and rank against a job description
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalyzeInput"
      responses:
        "200":
          description: Ranked candidates with fit scores and recruiter insights
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RankingResult"
        "400":
          description: Bad request
        "422":
          description: Invalid job description
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    ResumeInput:
      type: object
      required: [filename, text]
      properties:
        filename:
          type: string
        text:
          type: string

    ScoringWeights:
      type: object
      required: [skillsMatch, experienceRelevance, experienceDuration]
      properties:
        skillsMatch:
          type: number
          minimum: 0
          maximum: 100
        experienceRelevance:
          type: number
          minimum: 0
          maximum: 100
        experienceDuration:
          type: number
          minimum: 0
          maximum: 100

    AnalyzeInput:
      type: object
      required: [resumes, jobDescription]
      properties:
        resumes:
          type: array
          items:
            $ref: "#/components/schemas/ResumeInput"
          minItems: 1
        jobDescription:
          type: string
          minLength: 10
        weights:
          $ref: "#/components/schemas/ScoringWeights"

    ValidationErrorResponse:
      type: object
      required: [error, code]
      properties:
        error:
          type: string
        code:
          type: string

    CareerEntry:
      type: object
      required: [title, company, duration, highlights]
      properties:
        title:
          type: string
        company:
          type: string
        duration:
          type: string
        highlights:
          type: array
          items:
            type: string

    BehavioralSignals:
      type: object
      required: [leadershipScore, collaborationScore, adaptabilityScore, growthTrajectory]
      properties:
        leadershipScore:
          type: number
        collaborationScore:
          type: number
        adaptabilityScore:
          type: number
        growthTrajectory:
          type: string

    ParsedCandidate:
      type: object
      required: [id, name, title, location, yearsOfExperience, yearsOfExperiencePrecise, isEntryLevel, skills, careerHistory, behavioralSignals, summary, education, industries, email]
      properties:
        id:
          type: string
        name:
          type: string
        title:
          type: string
        location:
          type: string
        email:
          type: string
        yearsOfExperience:
          type: integer
        yearsOfExperiencePrecise:
          type: number
        isEntryLevel:
          type: boolean
        skills:
          type: array
          items:
            type: string
        careerHistory:
          type: array
          items:
            $ref: "#/components/schemas/CareerEntry"
        behavioralSignals:
          $ref: "#/components/schemas/BehavioralSignals"
        summary:
          type: string
        education:
          type: string
        industries:
          type: array
          items:
            type: string

    ScoreBreakdown:
      type: object
      required: [skillsMatch, experienceRelevance, experienceDuration, overall]
      properties:
        skillsMatch:
          type: number
        experienceRelevance:
          type: number
        experienceDuration:
          type: number
        overall:
          type: number

    RankedCandidate:
      type: object
      required: [candidate, fitScore, recruiterInsight, scoreBreakdown, matchedSkills, rank]
      properties:
        candidate:
          $ref: "#/components/schemas/ParsedCandidate"
        fitScore:
          type: number
        recruiterInsight:
          type: string
        scoreBreakdown:
          $ref: "#/components/schemas/ScoreBreakdown"
        matchedSkills:
          type: array
          items:
            type: string
        rank:
          type: integer

    RankingResult:
      type: object
      required: [rankedCandidates, totalAnalyzed, topMatchThreshold, processingStages]
      properties:
        rankedCandidates:
          type: array
          items:
            $ref: "#/components/schemas/RankedCandidate"
        totalAnalyzed:
          type: integer
        topMatchThreshold:
          type: number
        processingStages:
          type: array
          items:
            type: string
