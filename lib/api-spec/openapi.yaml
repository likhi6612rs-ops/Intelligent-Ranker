openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Candidate Ranking Dashboard API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: candidates
    description: Candidate profile operations
  - name: ranking
    description: AI ranking engine operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /candidates:
    get:
      operationId: getCandidates
      tags: [candidates]
      summary: Get all candidates
      description: Returns all candidate profiles in the data store
      responses:
        "200":
          description: List of candidates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Candidate"

  /candidates/{id}:
    get:
      operationId: getCandidate
      tags: [candidates]
      summary: Get a single candidate by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Candidate profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Candidate"
        "404":
          description: Not found

  /ranking/analyze:
    post:
      operationId: analyzeJobDescription
      tags: [ranking]
      summary: Analyze a job description and rank candidates
      description: Runs hybrid TF-IDF + BM25 + semantic scoring to rank candidates against a job description
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RankingInput"
      responses:
        "200":
          description: Ranked candidates with fit scores and recruiter insights
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RankingResult"

  /ranking/stats:
    get:
      operationId: getRankingStats
      tags: [ranking]
      summary: Get aggregate stats about the candidate pool
      responses:
        "200":
          description: Candidate pool statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PoolStats"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    CareerEntry:
      type: object
      required: [title, company, duration, highlights]
      properties:
        title:
          type: string
        company:
          type: string
        duration:
          type: string
        highlights:
          type: array
          items:
            type: string

    BehavioralSignals:
      type: object
      required: [leadershipScore, collaborationScore, adaptabilityScore, growthTrajectory]
      properties:
        leadershipScore:
          type: number
        collaborationScore:
          type: number
        adaptabilityScore:
          type: number
        growthTrajectory:
          type: string

    PlatformActivity:
      type: object
      required: [applicationsSubmitted, responseRate, avgTimeToRespond, lastActive]
      properties:
        applicationsSubmitted:
          type: integer
        responseRate:
          type: number
        avgTimeToRespond:
          type: string
        lastActive:
          type: string

    Candidate:
      type: object
      required:
        - id
        - name
        - title
        - location
        - yearsOfExperience
        - skills
        - careerHistory
        - behavioralSignals
        - platformActivity
        - summary
        - education
        - industries
      properties:
        id:
          type: string
        name:
          type: string
        title:
          type: string
        location:
          type: string
        yearsOfExperience:
          type: integer
        skills:
          type: array
          items:
            type: string
        careerHistory:
          type: array
          items:
            $ref: "#/components/schemas/CareerEntry"
        behavioralSignals:
          $ref: "#/components/schemas/BehavioralSignals"
        platformActivity:
          $ref: "#/components/schemas/PlatformActivity"
        summary:
          type: string
        education:
          type: string
        industries:
          type: array
          items:
            type: string

    RankingInput:
      type: object
      required: [jobDescription]
      properties:
        jobDescription:
          type: string
          minLength: 10

    ScoreBreakdown:
      type: object
      required:
        - semantic
        - keyword
        - experience
        - behavioral
        - overall
      properties:
        semantic:
          type: number
        keyword:
          type: number
        experience:
          type: number
        behavioral:
          type: number
        overall:
          type: number

    RankedCandidate:
      type: object
      required:
        - candidate
        - fitScore
        - recruiterInsight
        - scoreBreakdown
        - matchedSkills
        - rank
      properties:
        candidate:
          $ref: "#/components/schemas/Candidate"
        fitScore:
          type: number
        recruiterInsight:
          type: string
        scoreBreakdown:
          $ref: "#/components/schemas/ScoreBreakdown"
        matchedSkills:
          type: array
          items:
            type: string
        rank:
          type: integer

    RankingResult:
      type: object
      required: [rankedCandidates, totalAnalyzed, topMatchThreshold, processingStages]
      properties:
        rankedCandidates:
          type: array
          items:
            $ref: "#/components/schemas/RankedCandidate"
        totalAnalyzed:
          type: integer
        topMatchThreshold:
          type: number
        processingStages:
          type: array
          items:
            type: string

    PoolStats:
      type: object
      required:
        - totalCandidates
        - avgYearsExperience
        - topSkills
        - industryBreakdown
        - avgBehavioralScore
      properties:
        totalCandidates:
          type: integer
        avgYearsExperience:
          type: number
        topSkills:
          type: array
          items:
            type: string
        industryBreakdown:
          type: object
          additionalProperties:
            type: integer
        avgBehavioralScore:
          type: number
